<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IP Extractor — ErPyCode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red:       #dc2626;
    --red-dim:   rgba(220,38,38,0.14);
    --red-glow:  rgba(220,38,38,0.35);
    --red-border:rgba(220,38,38,0.35);
    --bg:        #000000;
    --bg2:       #0d0d0d;
    --bg3:       #161616;
    --bg4:       #1a1a1e;
    --border:    rgba(255,255,255,0.1);
    --text:      #f4f4f5;
    --muted:     #a1a1aa;
    --faint:     #71717a;
    --font:      'Vazirmatn', sans-serif;
    --mono:      'Courier Prime', 'Courier New', monospace;
  }

  html { scroll-behavior: smooth; overflow-x: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
    padding-bottom: 6rem;
  }

  ::selection { background: var(--red); color: #fff; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #000; }
  ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--red); }

  /* ── Grid bg ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(220,38,38,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(220,38,38,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout ── */
  .wrap {
    max-width: 860px;
    margin: 0 auto;
    padding: 60px 24px 40px;
    position: relative;
    z-index: 1;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 52px;
    animation: fadeDown .6s ease both;
  }
  .header-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--red-dim);
    border: 1px solid var(--red-border);
    color: var(--red);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    font-style: italic;
    letter-spacing: .2em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 9999px;
    margin-bottom: 22px;
  }
  .header-label::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--red);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--red);
    animation: blink 1.4s infinite;
  }
  .header h1 {
    font-family: var(--mono);
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 700;
    font-style: italic;
    letter-spacing: -.03em;
    line-height: 1;
    color: #fff;
    margin-bottom: 4px;
  }
  .header h1 span { color: var(--red); }
  .header-sub {
    color: var(--muted);
    font-size: 14px;
    margin-top: 10px;
    font-weight: 400;
    direction: rtl;
  }

  /* ── Drop Zone ── */
  .drop-zone {
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 52px 28px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s, box-shadow .2s;
    position: relative;
    background: var(--bg2);
    animation: fadeUp .5s .1s ease both;
    overflow: hidden;
  }
  .drop-zone::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(220,38,38,.04) 0%, transparent 65%);
    opacity: 0; transition: opacity .3s;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--red-border);
    background: var(--bg3);
    box-shadow: 0 0 40px rgba(220,38,38,.06), inset 0 0 40px rgba(220,38,38,.02);
  }
  .drop-zone:hover::before, .drop-zone.drag-over::before { opacity: 1; }
  .drop-zone.drag-over { transform: scale(1.008); }

  .drop-icon {
    width: 56px; height: 56px;
    margin: 0 auto 18px;
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    background: var(--bg3);
    transition: all .25s;
  }
  .drop-zone:hover .drop-icon {
    border-color: var(--red-border);
    box-shadow: 0 0 20px var(--red-glow);
    background: var(--red-dim);
  }

  .drop-title {
    font-size: 15px; font-weight: 700;
    color: var(--text); margin-bottom: 6px;
  }
  .drop-formats {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 4px;
  }
  .fmt-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    font-style: italic;
    padding: 4px 10px;
    border-radius: 6px;
    letter-spacing: .04em;
    transition: all .2s;
  }
  .drop-zone:hover .fmt-badge {
    border-color: var(--red-border);
    color: var(--text);
    background: var(--red-dim);
  }
  .fmt-sep {
    color: var(--faint);
    font-size: 14px;
    line-height: 1;
  }

  #fileInput { display: none; }

  /* ── File chip ── */
  .file-chip {
    display: none;
    align-items: center; gap: 10px;
    background: var(--red-dim);
    border: 1px solid var(--red-border);
    border-radius: 8px;
    padding: 11px 16px;
    margin-top: 14px;
    font-family: var(--mono);
    font-size: 12px;
    animation: fadeUp .3s ease both;
  }
  .file-chip.show { display: flex; }
  .file-chip .fc-name { color: var(--red); flex: 1; font-weight: 700; font-style: italic; }
  .file-chip .fc-size { color: var(--muted); font-size: 12px; }

  /* ── Options grid ── */
  .section-label {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    font-style: italic;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    padding-right: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::before {
    content: '';
    display: inline-block;
    width: 3px; height: 14px;
    background: var(--red);
    border-radius: 2px;
    flex-shrink: 0;
  }

  .options-group {
    margin-top: 22px;
    animation: fadeUp .5s .15s ease both;
  }
  .options-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  @media (max-width: 480px) {
    .options-grid { grid-template-columns: 1fr; }
  }

  .opt-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all .2s;
    display: flex; align-items: center; gap: 12px;
    font-size: 14px; font-weight: 600;
    color: var(--muted);
    user-select: none;
  }
  .opt-card input { display: none; }
  .opt-check {
    width: 20px; height: 20px;
    border: 1px solid var(--faint);
    border-radius: 5px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 900;
    transition: all .2s;
    font-family: var(--mono);
    color: transparent;
  }
  .opt-card:hover { border-color: rgba(220,38,38,.3); color: var(--text); background: var(--bg3); }
  .opt-card.active {
    border-color: var(--red-border);
    color: var(--text);
    background: var(--bg3);
  }
  .opt-card.active .opt-check {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
    box-shadow: 0 0 10px var(--red-glow);
  }

  /* ── Limit selector ── */
  .limit-group {
    margin-top: 18px;
    animation: fadeUp .5s .2s ease both;
  }
  .limit-row {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .limit-btn {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 9999px;
    padding: 9px 20px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    font-style: italic;
    color: var(--muted);
    cursor: pointer;
    transition: all .2s;
    user-select: none;
  }
  .limit-btn:hover { border-color: var(--red-border); color: var(--text); background: var(--bg3); }
  .limit-btn.active {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
    box-shadow: 0 0 16px rgba(220,38,38,.25);
  }

  /* ── Extract Button ── */
  .btn-extract {
    width: 100%;
    margin-top: 26px;
    padding: 15px;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 9999px;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    font-style: italic;
    letter-spacing: .08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    animation: fadeUp .5s .25s ease both;
    box-shadow: 0 4px 20px rgba(220,38,38,.15);
  }
  .btn-extract:hover:not(:disabled) {
    background: #fff;
    color: #000;
    box-shadow: 0 4px 30px rgba(220,38,38,.2), 0 0 60px rgba(220,38,38,.1);
    transform: translateY(-1px);
  }
  .btn-extract:active:not(:disabled) { transform: translateY(0); }
  .btn-extract:disabled {
    background: var(--bg3);
    color: var(--faint);
    cursor: not-allowed;
    box-shadow: none;
  }

  /* ── Terminal Output ── */
  .result-section {
    display: none;
    margin-top: 40px;
    animation: fadeUp .5s ease both;
  }
  .result-section.show { display: block; }

  .result-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
  }
  .result-meta {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 12px; color: var(--muted);
    font-style: italic;
  }
  .result-badge {
    background: var(--red-dim);
    border: 1px solid var(--red-border);
    color: #f87171;
    font-family: var(--mono); font-size: 12px; font-weight: 700;
    padding: 4px 12px; border-radius: 9999px;
    font-style: italic;
  }

  .stats-bar {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .stat-pill {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 14px;
    font-family: var(--mono); font-size: 12px;
    color: var(--muted); font-style: italic;
  }
  .stat-pill b { color: var(--text); font-weight: 700; }

  /* Terminal box */
  .terminal-box {
    background: var(--bg4);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .terminal-topbar {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,.04);
    background: rgba(255,255,255,.02);
  }
  .t-dot { width: 9px; height: 9px; border-radius: 50%; }
  .t-dot.r { background: var(--red); }
  .t-dot.y { background: #eab308; }
  .t-dot.g { background: #22c55e; }
  .terminal-filename {
    margin-right: 10px;
    font-family: var(--mono); font-size: 11px;
    color: var(--muted); font-style: italic;
    letter-spacing: .1em; text-transform: uppercase;
  }

  #outputArea {
    width: 100%;
    min-height: 240px;
    max-height: 400px;
    background: transparent;
    border: none; outline: none;
    padding: 16px 18px;
    font-family: var(--mono);
    font-size: 14px;
    color: #4ade80;
    line-height: 2;
    resize: vertical;
    direction: ltr;
    text-align: left;
  }

  /* ── Action Buttons ── */
  .action-row {
    display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap;
  }

  .btn-action {
    flex: 1; min-width: 140px;
    padding: 13px 20px;
    border-radius: 9999px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px; font-weight: 700; font-style: italic;
    text-transform: uppercase; letter-spacing: .08em;
    cursor: pointer; transition: all .2s;
    display: flex; align-items: center; justify-content: center; gap: 7px;
  }
  .btn-action:hover {
    border-color: var(--red-border);
    color: var(--text);
    background: var(--bg3);
  }
  .btn-action.primary {
    background: var(--red-dim);
    border-color: var(--red-border);
    color: #f87171;
  }
  .btn-action.primary:hover {
    background: var(--red);
    color: #fff;
    box-shadow: 0 4px 20px rgba(220,38,38,.25);
  }
  .btn-action.success {
    border-color: rgba(74,222,128,.35);
    color: #4ade80;
    background: rgba(74,222,128,.06);
  }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--bg4);
    border: 1px solid var(--red-border);
    color: var(--text);
    font-family: var(--mono); font-size: 12px; font-weight: 700; font-style: italic;
    padding: 11px 24px;
    border-radius: 9999px;
    box-shadow: 0 0 30px rgba(220,38,38,.12);
    opacity: 0; transition: all .3s; pointer-events: none;
    z-index: 999; white-space: nowrap;
  }
  .toast .toast-red { color: var(--red); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Footer ── */
  .site-footer {
    text-align: center;
    margin-top: 52px;
    padding: 20px 0 8px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 13px;
    color: var(--faint);
    font-family: var(--font);
  }
  .site-footer .heart {
    color: var(--red);
    font-size: 14px;
    animation: heartbeat 1.8s ease infinite;
  }
  .footer-link {
    color: var(--muted);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-weight: 600;
    transition: color .2s;
  }
  .footer-link:hover { color: var(--red); }

  @keyframes heartbeat {
    0%,100% { transform: scale(1); }
    14%      { transform: scale(1.25); }
    28%      { transform: scale(1); }
    42%      { transform: scale(1.15); }
    56%      { transform: scale(1); }
  }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* ── Responsive ── */
  @media (max-width: 500px) {
    .options-grid { grid-template-columns: 1fr 1fr; }
    .btn-action { min-width: 100%; }
    .limit-row { gap: 6px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="header-label">ErPyCode Tools</div>
    <h1><span>IP</span> Extractor</h1>
    <p class="header-sub">فایل اسکنر رو بنداز — آی‌پی‌های تمیز رو بیرون بکش</p>
  </div>

  <!-- Drop Zone -->
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".txt,.log,.csv">
    <div class="drop-icon">📂</div>
    <div class="drop-title">فایل رو اینجا رها کن یا کلیک کن</div>
    <div class="drop-formats">
      <span class="fmt-badge">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        .txt
      </span>
      <span class="fmt-sep">·</span>
      <span class="fmt-badge">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        .log
      </span>
      <span class="fmt-sep">·</span>
      <span class="fmt-badge">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        .csv
      </span>
    </div>
  </div>

  <div class="file-chip" id="fileChip">
    <span style="font-size:16px">📄</span>
    <span class="fc-name" id="fcName">—</span>
    <span class="fc-size" id="fcSize">—</span>
  </div>

  <!-- Filter Options -->
  <div class="options-group">
    <div class="section-label">// گزینه‌های فیلتر</div>
    <div class="options-grid">
      <label class="opt-card active" id="optPort">
        <input type="checkbox" id="chkPort" checked>
        <div class="opt-check">✓</div>
        <span>حذف پورت</span>
      </label>
      <label class="opt-card active" id="optDupe">
        <input type="checkbox" id="chkDupe" checked>
        <div class="opt-check">✓</div>
        <span>حذف تکراری‌ها</span>
      </label>
      <label class="opt-card active" id="optHealthy">
        <input type="checkbox" id="chkHealthy" checked>
        <div class="opt-check">✓</div>
        <span>فقط healthy</span>
      </label>
    </div>
  </div>

  <!-- Limit Selector -->
  <div class="limit-group">
    <div class="section-label">// تعداد خروجی</div>
    <div class="limit-row" id="limitRow">
      <div class="limit-btn active" data-val="all">همه</div>
      <div class="limit-btn" data-val="10">۱۰ تا اول</div>
      <div class="limit-btn" data-val="20">۲۰ تا اول</div>
      <div class="limit-btn" data-val="50">۵۰ تا اول</div>
      <div class="limit-btn" data-val="100">۱۰۰ تا اول</div>
    </div>
  </div>

  <!-- Extract Button -->
  <button class="btn-extract" id="btnExtract" disabled>
    <span>▶</span>
    <span id="btnLabel">استخراج آی‌پی‌ها</span>
  </button>

  <!-- Results -->
  <div class="result-section" id="resultSection">
    <div class="result-header">
      <div class="result-meta">// output</div>
      <span class="result-badge" id="resultBadge">0 IP</span>
    </div>

    <div class="stats-bar" id="statsBar"></div>

    <div class="terminal-box">
      <div class="terminal-topbar">
        <div class="t-dot r"></div>
        <div class="t-dot y"></div>
        <div class="t-dot g"></div>
        <span class="terminal-filename">extracted_ips.txt</span>
      </div>
      <textarea id="outputArea" readonly spellcheck="false"></textarea>
    </div>

    <div class="action-row">
      <button class="btn-action" id="btnCopy">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <span>کپی</span>
      </button>
      <button class="btn-action primary" id="btnSave">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span id="saveBtnLabel">دانلود فایل</span>
      </button>
    </div>
  </div>

</div>

<footer class="site-footer">
  <span>ساخته شده با</span>
  <span class="heart">♥</span>
  <span>توسط</span>
  <a href="https://github.com/erpycode" target="_blank" rel="noopener" class="footer-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">

<div class="toast" id="toast"><span id="toastMsg">—</span></div>

<script>
  /* ── Elements ── */
  const dropZone    = document.getElementById('dropZone');
  const fileInput   = document.getElementById('fileInput');
  const fileChip    = document.getElementById('fileChip');
  const fcName      = document.getElementById('fcName');
  const fcSize      = document.getElementById('fcSize');
  const btnExtract  = document.getElementById('btnExtract');
  const btnLabel    = document.getElementById('btnLabel');
  const resultSec   = document.getElementById('resultSection');
  const outputArea  = document.getElementById('outputArea');
  const resultBadge = document.getElementById('resultBadge');
  const statsBar    = document.getElementById('statsBar');
  const btnCopy     = document.getElementById('btnCopy');
  const btnSave     = document.getElementById('btnSave');
  const saveBtnLabel= document.getElementById('saveBtnLabel');
  const toast       = document.getElementById('toast');
  const toastMsg    = document.getElementById('toastMsg');
  const limitRow    = document.getElementById('limitRow');

  let fileContent   = '';
  let loadedFileName= '';
  let extractedIPs  = [];
  let limitVal      = 'all';

  /* ── Detect save mode ──
     If opened as local file: protocol = file:
     If hosted on a server: protocol = http: / https:
  */
  const isLocal = location.protocol === 'file:';

  /* ── Limit Buttons ── */
  limitRow.querySelectorAll('.limit-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      limitRow.querySelectorAll('.limit-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      limitVal = btn.dataset.val;
    });
  });

  /* ── Toggle Checkbox Options ── */
  ['optPort','optDupe','optHealthy'].forEach(id => {
    const card = document.getElementById(id);
    card.addEventListener('click', () => {
      const cb  = card.querySelector('input');
      const chk = card.querySelector('.opt-check');
      cb.checked = !cb.checked;
      card.classList.toggle('active', cb.checked);
      chk.textContent = cb.checked ? '✓' : '';
    });
  });

  /* ── Drag & Drop ── */
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) loadFile(f);
  });
  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

  function loadFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
      fileContent    = e.target.result;
      loadedFileName = file.name;
      fcName.textContent = file.name;
      fcSize.textContent = fmtBytes(file.size);
      fileChip.classList.add('show');
      btnExtract.disabled = false;
      resultSec.classList.remove('show');
    };
    reader.readAsText(file, 'utf-8');
  }

  /* ── Extract ── */
  btnExtract.addEventListener('click', extract);

  function extract() {
    const removePort  = document.getElementById('chkPort').checked;
    const removeDupes = document.getElementById('chkDupe').checked;
    const onlyHealthy = document.getElementById('chkHealthy').checked;

    const lines   = fileContent.split('\n');
    // Match IP with optional :PORT — port is ANY number
    const ipRe    = /\b(\d{1,3}(?:\.\d{1,3}){3})(?::(\d+))?\b/;
    const skipRe  = /^(SenPai|Started|Updated|Plan|ENDPOINT|={3}|─)/;

    let found           = [];
    let skippedUnhealthy = 0;
    let totalMatched    = 0;

    for (const line of lines) {
      const t = line.trim();
      if (!t || skipRe.test(t)) continue;

      const hasIp = ipRe.test(t);
      if (!hasIp) continue;
      totalMatched++;

      if (onlyHealthy && !t.toLowerCase().includes('healthy')) {
        skippedUnhealthy++;
        continue;
      }

      const m = t.match(ipRe);
      if (m) {
        let entry = m[1];
        if (!removePort && m[2]) entry = entry + ':' + m[2];
        found.push(entry);
      }
    }

    if (removeDupes) {
      found = [...new Set(found)];
    }

    // Apply limit
    const limit  = limitVal === 'all' ? Infinity : parseInt(limitVal);
    const sliced = found.slice(0, limit);

    extractedIPs = sliced;

    /* Render */
    outputArea.value = sliced.join('\n');
    resultBadge.textContent = sliced.length + ' IP';

    /* Stats */
    statsBar.innerHTML = `
      <div class="stat-pill">کل با آی‌پی: <b>${totalMatched}</b></div>
      <div class="stat-pill">استخراج‌شده: <b>${sliced.length}</b></div>
      ${found.length > sliced.length ? `<div class="stat-pill">محدود‌شده از: <b>${found.length}</b></div>` : ''}
      ${skippedUnhealthy ? `<div class="stat-pill">رد‌شده: <b>${skippedUnhealthy}</b></div>` : ''}
    `;

    resultSec.classList.add('show');
    resultSec.scrollIntoView({ behavior: 'smooth', block: 'start' });

    /* Button feedback */
    btnLabel.textContent = 'استخراج موفق ✓';
    setTimeout(() => { btnLabel.textContent = 'استخراج مجدد'; }, 2000);

    /* Update save button label based on env */
    saveBtnLabel.textContent = 'دانلود فایل';
  }

  /* ── Copy ── */
  btnCopy.addEventListener('click', async () => {
    if (!extractedIPs.length) return;
    try {
      await navigator.clipboard.writeText(outputArea.value);
      btnCopy.classList.add('success');
      btnCopy.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg><span>کپی شد</span>';
      showToast('✓ ' + extractedIPs.length + ' آی‌پی کپی شد');
      setTimeout(() => {
        btnCopy.classList.remove('success');
        btnCopy.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span>کپی</span>';
      }, 2000);
    } catch { showToast('خطا در کپی'); }
  });

  /* ── Save / Download ── */
  btnSave.addEventListener('click', () => {
    if (!extractedIPs.length) return;
    const blob = new Blob([outputArea.value], { type: 'text/plain' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.download = 'extracted_ips.txt';
    a.href     = url;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('↓ extracted_ips.txt دانلود شد');
  });

  /* ── Toast ── */
  let toastTimer;
  function showToast(msg) {
    toastMsg.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
  }

  /* ── Utils ── */
  function fmtBytes(b) {
    if (b < 1024)        return b + ' B';
    if (b < 1048576)     return (b / 1024).toFixed(1) + ' KB';
    return (b / 1048576).toFixed(1) + ' MB';
  }
</script>
